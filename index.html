<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/apoe1.png" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <title>Vitória 🏅</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .botoes {
      margin-top: 20px;
      display: flex;
      gap: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #mensagem {
      margin-top: 20px;
      display: none;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Vitória, você já percebeu que eu, Pablo, estou completamente apaixonado por você?</h1>

  <div class="botoes">
    <button id="sim">Sim… e eu sinto o mesmo por você.</button>
    <button id="nao">Não 😅</button>
  </div>

  <p id="mensagem"></p>

<script>
  const botaoNao = document.getElementById('nao');
  const botaoSim = document.getElementById('sim');
  const mensagem = document.getElementById('mensagem');

  let velocidade = 1; // começa normal

  function moverBotao() {
    const larguraMax = window.innerWidth - botaoNao.offsetWidth;
    const alturaMax = window.innerHeight - botaoNao.offsetHeight;

    const novaPosicaoX = Math.random() * larguraMax;
    const novaPosicaoY = Math.random() * alturaMax;

    botaoNao.style.position = 'absolute';
    botaoNao.style.left = `${novaPosicaoX}px`;
    botaoNao.style.top = `${novaPosicaoY}px`;
  }

  // Evento para celular (toque)
  botaoNao.addEventListener('touchstart', (e) => {
    e.preventDefault(); // impede clique normal
    velocidade += 1; // aumenta a velocidade

    for (let i = 0; i < velocidade; i++) {
      moverBotao();
    }
  });

  // Mantém funcionando no PC também
  botaoNao.addEventListener('mouseover', () => {
    moverBotao();
  });

  botaoSim.addEventListener('click', () => {
    mensagem.style.display = 'block';
    mensagem.textContent = 'Eu sabia que você diria SIM!';

    setTimeout(() => {
      window.location.href = "https://www.youtube.com/watch?v=ZIiQ1jMqhVM";
    }, 3000);
  });
</script>

</body>
</html>
